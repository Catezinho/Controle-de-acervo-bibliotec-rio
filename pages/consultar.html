<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar — Acervo Tech Digital</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📚 AcervoTech</div>
            <div class="menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="livros.html">Livros</a>
                <a href="usuarios.html">Usuários</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="devolucoes.html">Devoluções</a>
                <a href="consultar.html" class="ativo">Consultar</a>
                <a href="relatorios.html">Relatórios</a>
            </div>
            <div class="usuario">
                <span id="nomeUsuario"></span>
                <button onclick="logout()"
                    style="background:#d32f2f; color:white; border:none;
                           padding:5px 10px; border-radius:4px; cursor:pointer;">
                    Sair
                </button>
            </div>
        </nav>

        <h2>Consultar Acervo</h2>
        <div class="busca">
            <input type="text" id="campoBusca" placeholder="Digite título, autor ou gênero...">
            <button onclick="buscar()">Buscar</button>
            <button onclick="limparBusca()" style="background:#999;">Limpar</button>
        </div>
        <div id="resultados"></div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // Cache local dos livros carregados da API para filtrar sem novas requisições
        let todosOsLivros = [];

        /**
         * Carrega todos os livros da API e armazena em cache local.
         * A busca é feita no front-end sobre esse cache para maior agilidade.
         */
        function carregarAcervo() {
            fetch('http://127.0.0.1:8000/api/livros')
                .then(res => {
                    if (!res.ok) throw new Error('Falha ao carregar o acervo.');
                    return res.json();
                })
                .then(livros => {
                    todosOsLivros = livros;
                })
                .catch(err => {
                    document.getElementById('resultados').innerHTML =
                        `<p style="color:#c62828;">Erro ao carregar acervo: ${err.message}</p>`;
                });
        }

        /**
         * Filtra o cache de livros pelo termo digitado e exibe os resultados.
         * A busca abrange título, autor e gênero (case-insensitive).
         *
         * CORREÇÃO: Antes filtrava apenas a variável local de dados.js, que
         * continha apenas 3 livros fixos de exemplo. Agora usa os dados reais da API.
         */
        function buscar() {
            const termo     = document.getElementById('campoBusca').value.trim().toLowerCase();
            const container = document.getElementById('resultados');

            if (!termo) {
                container.innerHTML = '<p>Digite um termo para buscar.</p>';
                return;
            }

            const resultados = todosOsLivros.filter(l =>
                l.titulo.toLowerCase().includes(termo) ||
                l.autor.toLowerCase().includes(termo)  ||
                (l.genero && l.genero.toLowerCase().includes(termo))
            );

            if (resultados.length === 0) {
                container.innerHTML = `<p>Nenhum livro encontrado para "<strong>${termo}</strong>".</p>`;
                return;
            }

            let html = `<h3>${resultados.length} resultado(s) encontrado(s):</h3><div class="card-grid">`;
            resultados.forEach(l => {
                html += `
                    <div class="card" style="text-align:left;">
                        <h4>${l.titulo}</h4>
                        <p><strong>Autor:</strong> ${l.autor}</p>
                        <p><strong>ISBN:</strong> ${l.isbn || '—'}</p>
                        <p><strong>Gênero:</strong> ${l.genero || 'Geral'}</p>
                        <p><strong>Disponíveis:</strong> ${l.disponiveis} / ${l.exemplares}</p>
                        <p>${l.disponiveis > 0 ? '✅ Disponível para empréstimo' : '❌ Sem exemplares disponíveis'}</p>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        /**
         * Limpa o campo de busca e os resultados exibidos.
         */
        function limparBusca() {
            document.getElementById('campoBusca').value = '';
            document.getElementById('resultados').innerHTML = '';
        }

        document.addEventListener('DOMContentLoaded', function () {
            verificarAutenticacao();
            exibirUsuarioNoMenu();
            carregarAcervo();   // Pré-carrega o acervo ao abrir a página

            // Permite buscar pressionando Enter no campo de texto
            document.getElementById('campoBusca').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') buscar();
            });
        });
    </script>
</body>
</html>
