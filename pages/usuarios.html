<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários — Acervo Tech Digital</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📚 AcervoTech</div>
            <div class="menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="livros.html">Livros</a>
                <a href="usuarios.html" class="ativo">Usuários</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="devolucoes.html">Devoluções</a>
                <a href="consultar.html">Consultar</a>
                <a href="relatorios.html">Relatórios</a>
            </div>
            <div class="usuario">
                <span id="nomeUsuario"></span>
                <button onclick="logout()"
                    style="background:#d32f2f; color:white; border:none;
                           padding:5px 10px; border-radius:4px; cursor:pointer;">
                    Sair
                </button>
            </div>
        </nav>

        <h2>Gerenciar Usuários da Biblioteca</h2>
        <button onclick="abrirFormUsuario()" class="btn-primary"
                style="width:auto; margin-bottom:16px;">
            + Novo Usuário
        </button>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Tipo</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaUsuarios"></tbody>
            </table>
        </div>

        <!-- Formulário de Cadastro / Edição de Usuário -->
        <div id="formUsuarioContainer" style="display:none; margin-top:20px;">
            <div class="form-padrao">
                <h3 id="formUsuarioTitulo">Cadastrar Usuário</h3>
                <form id="formUsuario">
                    <input type="hidden" id="usuarioId">
                    <div class="campo">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="campo">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="campo">
                        <label for="tipo">Tipo</label>
                        <select id="tipo">
                            <option value="Aluno">Aluno</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>
                    <div class="campo" style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="ativo" checked>
                        <label for="ativo">Usuário ativo</label>
                    </div>
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="fecharFormUsuario()"
                            style="background:#999; margin-top:10px; color:white;
                                   border:none; padding:10px; border-radius:4px; cursor:pointer;">
                        Cancelar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/usuarios.js"></script>
</body>
</html>
