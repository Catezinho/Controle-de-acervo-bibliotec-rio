<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoluções — Acervo Tech Digital</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">📚 Biblioteca</div>
            <div class="menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="livros.html">Livros</a>
                <a href="usuarios.html">Usuários</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="devolucoes.html" class="ativo">Devoluções</a>
                <a href="consultar.html">Consultar</a>
                <a href="relatorios.html">Relatórios</a>
            </div>
            <div class="usuario">
                <span id="nomeUsuario"></span>
                <button onclick="logout()"
                    style="background:#d32f2f; color:white; border:none;
                           padding:5px 10px; border-radius:4px; cursor:pointer;">
                    Sair
                </button>
            </div>
        </nav>

        <h2>Registrar Devolução</h2>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Livro</th>
                        <th>Usuário</th>
                        <th>Previsão</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaDevolucoes"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        /**
         * Carrega apenas os empréstimos com status 'ativo' para a tela de devoluções.
         * CORREÇÃO: Usa a API em vez das variáveis locais de dados.js.
         */
        function carregarDevolucoes() {
            const tbody = document.getElementById('tabelaDevolucoes');
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center; padding:20px; color:#666;">
                        Carregando empréstimos ativos...
                    </td>
                </tr>`;

            fetch('http://127.0.0.1:8000/api/emprestimos?status_filtro=ativo')
                .then(res => {
                    if (!res.ok) throw new Error('Falha ao comunicar com o servidor.');
                    return res.json();
                })
                .then(emprestimos => {
                    tbody.innerHTML = '';

                    if (emprestimos.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" style="text-align:center; padding:20px; color:#666;">
                                    Nenhum empréstimo ativo no momento.
                                </td>
                            </tr>`;
                        return;
                    }

                    const hoje = new Date();
                    hoje.setHours(0, 0, 0, 0);

                    emprestimos.forEach(emp => {
                        const previsao = new Date(emp.data_devolucao_prevista + 'T00:00:00');
                        const atrasado = hoje > previsao;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${emp.id}</td>
                            <td>${emp.titulo_livro}</td>
                            <td>${emp.nome_usuario}</td>
                            <td>${emp.data_devolucao_prevista}</td>
                            <td>
                                <span class="status ${atrasado ? 'atrasado' : 'ativo'}">
                                    ${atrasado ? '⚠️ Atrasado' : '✅ Em dia'}
                                </span>
                            </td>
                            <td>
                                <button
                                    onclick="confirmarDevolucao(${emp.id})"
                                    class="btn-primary"
                                    style="width:auto; padding:6px 16px;">
                                    Devolver
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align:center; padding:20px; color:#c62828;">
                                Erro: ${err.message}
                            </td>
                        </tr>`;
                });
        }

        /**
         * Envia a solicitação de devolução para a API e exibe o resumo da multa.
         *
         * CORREÇÃO: Antes a devolução era apenas local (mudava a variável em memória).
         * Agora é persistida no banco via API, e o estoque do livro é corretamente
         * atualizado no back-end.
         *
         * @param {number} id - ID do empréstimo a ser devolvido.
         */
        function confirmarDevolucao(id) {
            if (!confirm('Confirmar devolução deste empréstimo?')) return;

            fetch(`http://127.0.0.1:8000/api/emprestimos/${id}/devolver`, { method: 'POST' })
                .then(async res => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'Erro ao registrar devolução.');
                    return data;
                })
                .then(data => {
                    let msg = '✅ Devolução registrada com sucesso!';
                    if (data.dias_atraso > 0) {
                        msg += `\n\n⚠️ Atraso: ${data.dias_atraso} dia(s)\nMulta: R$ ${data.multa.toFixed(2)}`;
                    } else {
                        msg += '\n\nEntregue no prazo. Sem multa.';
                    }
                    alert(msg);
                    carregarDevolucoes();   // Atualiza a tabela removendo o empréstimo devolvido
                })
                .catch(err => alert('Erro: ' + err.message));
        }

        document.addEventListener('DOMContentLoaded', function () {
            verificarAutenticacao();
            exibirUsuarioNoMenu();
            carregarDevolucoes();
        });
    </script>
</body>
</html>
