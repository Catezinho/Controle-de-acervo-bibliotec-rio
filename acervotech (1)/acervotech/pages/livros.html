<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros - AcervoTech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
            gap: 12px;
        }
        .topbar .logo {
            font-size: 26px; font-weight: 700; color:#fff;
            display: flex; align-items: center; gap: 10px;
        }
        .topbar .logo i { color: #7c6dd6; font-size:30px; }
        .topbar .logo span { color: #7c6dd6; }
        .topbar .user-area {
            display: flex; align-items: center; gap: 20px;
            flex-wrap: wrap;
        }
        .topbar .user-area .user-name {
            font-weight: 400; font-size: 16px; color: #ddd;
        }
        .topbar .user-area .user-name i { margin-right: 8px; color: #7c6dd6; }
        .btn-logout {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 8px 18px; border-radius: 30px;
            font-weight: 500; cursor: pointer; transition: all 0.3s;
            font-size: 14px;
        }
        .btn-logout:hover { background: #e74c3c; border-color:#e74c3c; transform:scale(1.02); }

        .menu {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 15px 40px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .menu a {
            color: #ccc; text-decoration: none;
            padding: 10px 22px; border-radius: 30px;
            font-size: 15px; font-weight: 500;
            transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
        }
        .menu a i { font-size: 16px; }
        .menu a:hover { background: rgba(255,255,255,0.08); color:#fff; }
        .menu a.ativo {
            background: rgba(124,109,214,0.25);
            color: #fff;
            border-color: rgba(124,109,214,0.4);
            box-shadow: 0 0 20px rgba(124,109,214,0.15);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 30px 40px;
        }
        .container h2 {
            font-weight: 300; font-size: 28px; color:#fff; margin-bottom: 10px;
        }
        .container .subtitle {
            color: #aaa; font-weight: 300; margin-bottom: 30px;
        }

        .form-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 28px 25px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
        }
        .form-card h3 {
            font-weight: 400;
            margin-bottom: 16px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-bottom: 20px;
        }
        .form-grid input {
            padding: 14px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .form-grid input::placeholder { color: #aaa; }
        .form-grid input:focus {
            border-color: #7c6dd6;
            background: rgba(255,255,255,0.08);
        }
        .form-grid input[type="number"] { -moz-appearance: textfield; }
        .form-grid input[type="number"]::-webkit-inner-spin-button,
        .form-grid input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn {
            background: linear-gradient(135deg, #4a3f8a, #7c6dd6);
            border: none;
            color: #fff;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(74,63,138,0.4);
        }
        .btn i { font-size: 18px; }

        .table-wrapper {
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            overflow-x: auto;
        }
        .table-wrapper h3 {
            font-weight: 400;
            margin-bottom: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        th {
            font-weight: 600;
            color: #bbb;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            color: #eee;
            font-weight: 300;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .badge-disponivel {
            background: rgba(46,213,115,0.2);
            color: #2ed573;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
        }
        .badge-indisponivel {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
        }

        .mensagem {
            padding: 12px 18px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
        }
        .mensagem.sucesso {
            background: rgba(46,213,115,0.15);
            color: #2ed573;
            display: block;
        }
        .mensagem.erro {
            background: rgba(255,71,87,0.15);
            color: #ff4757;
            display: block;
        }

        @media (max-width: 768px) {
            .topbar, .menu { padding: 12px 20px; }
            .topbar .logo { font-size: 22px; }
            .menu a { padding: 8px 16px; font-size: 13px; }
            .container { padding: 0 20px 30px; }
        }
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Verificação de login -->
    <script>
        const usuario = localStorage.getItem('usuario');
        if (!usuario) window.location.href = '/';
        const dadosUsuario = JSON.parse(usuario);
    </script>

    <!-- Topbar -->
    <header class="topbar">
        <div class="logo"><i class="fas fa-book-open"></i> Acervo<span>Tech</span></div>
        <div class="user-area">
            <span class="user-name"><i class="fas fa-user-circle"></i> <span id="nome-usuario"></span></span>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </header>

    <!-- Menu -->
    <nav class="menu">
        <a href="/pages/dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="/pages/livros.html" class="ativo"><i class="fas fa-book"></i> Livros</a>
        <a href="/pages/usuarios.html"><i class="fas fa-users"></i> Usuários</a>
        <a href="/pages/emprestimos.html"><i class="fas fa-hand-holding"></i> Empréstimos</a>
        <a href="/pages/devolucoes.html"><i class="fas fa-undo-alt"></i> Devoluções</a>
    </nav>

    <!-- Conteúdo -->
    <div class="container">
        <h2>📚 Gerenciar Livros</h2>
        <p class="subtitle">Cadastre novos livros e acompanhe o acervo disponível.</p>

        <div id="mensagem" class="mensagem"></div>

        <!-- Formulário de cadastro -->
        <div class="form-card">
            <h3><i class="fas fa-plus-circle"></i> Cadastrar Novo Livro</h3>
            <form id="formLivro">
                <div class="form-grid">
                    <input type="text" id="titulo" placeholder="Título *" required>
                    <input type="text" id="autor" placeholder="Autor *" required>
                    <input type="text" id="isbn" placeholder="ISBN (opcional)">
                    <input type="text" id="genero" placeholder="Gênero (opcional)">
                    <input type="number" id="exemplares" placeholder="Exemplares" value="1" min="1">
                </div>
                <button type="submit" class="btn"><i class="fas fa-save"></i> Cadastrar Livro</button>
            </form>
        </div>

        <!-- Lista de livros -->
        <div class="table-wrapper">
            <h3><i class="fas fa-list"></i> Lista de Livros</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>ISBN</th>
                        <th>Gênero</th>
                        <th>Exemplares</th>
                        <th>Disponíveis</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="7" style="text-align:center;">Carregando livros...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Nome do usuário
        document.getElementById('nome-usuario').textContent = dadosUsuario.nome;

        function logout() {
            localStorage.removeItem('usuario');
            window.location.href = '/';
        }

        const form = document.getElementById('formLivro');
        const mensagemDiv = document.getElementById('mensagem');
        const corpoTabela = document.getElementById('corpoTabela');

        function exibirMensagem(texto, tipo) {
            mensagemDiv.textContent = texto;
            mensagemDiv.className = 'mensagem ' + tipo;
            setTimeout(() => { mensagemDiv.className = 'mensagem'; }, 5000);
        }

        // Listar livros
        async function carregarLivros() {
            try {
                const resposta = await fetch('/api/livros');
                if (!resposta.ok) throw new Error('Erro ao buscar livros');
                const livros = await resposta.json();

                if (livros.length === 0) {
                    corpoTabela.innerHTML = `<tr><td colspan="7" style="text-align:center;">Nenhum livro cadastrado.</td></tr>`;
                    return;
                }

                let html = '';
                livros.forEach(livro => {
                    const statusDisponivel = livro.disponiveis > 0 ? 'badge-disponivel' : 'badge-indisponivel';
                    const statusTexto = livro.disponiveis > 0 ? 'Disponível' : 'Indisponível';
                    html += `
                        <tr>
                            <td>${livro.id}</td>
                            <td><strong>${livro.titulo}</strong></td>
                            <td>${livro.autor}</td>
                            <td>${livro.isbn || '-'}</td>
                            <td>${livro.genero || '-'}</td>
                            <td>${livro.exemplares}</td>
                            <td><span class="${statusDisponivel}">${livro.disponiveis} ${statusTexto}</span></td>
                        </tr>
                    `;
                });
                corpoTabela.innerHTML = html;

            } catch (erro) {
                console.error(erro);
                corpoTabela.innerHTML = `<tr><td colspan="7" style="text-align:center; color: #ff4757;">Erro ao carregar livros.</td></tr>`;
            }
        }

        // Cadastrar livro
        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const titulo = document.getElementById('titulo').value.trim();
            const autor = document.getElementById('autor').value.trim();
            const isbn = document.getElementById('isbn').value.trim();
            const genero = document.getElementById('genero').value.trim();
            const exemplares = parseInt(document.getElementById('exemplares').value) || 1;

            if (!titulo || !autor) {
                exibirMensagem('Título e Autor são obrigatórios.', 'erro');
                return;
            }

            const dados = {
                titulo,
                autor,
                isbn: isbn || null,
                genero: genero || null,
                exemplares
            };

            try {
                const resposta = await fetch('/api/livros', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                const resultado = await resposta.json();

                if (resposta.ok) {
                    exibirMensagem(`✅ Livro "${titulo}" cadastrado com sucesso!`, 'sucesso');
                    form.reset();
                    document.getElementById('exemplares').value = 1;
                    carregarLivros();
                } else {
                    exibirMensagem(`❌ ${resultado.detail || 'Falha ao cadastrar.'}`, 'erro');
                }
            } catch (erro) {
                console.error(erro);
                exibirMensagem('❌ Erro ao conectar com o servidor.', 'erro');
            }
        });

        // Inicializar
        carregarLivros();
    </script>
</body>
</html>
