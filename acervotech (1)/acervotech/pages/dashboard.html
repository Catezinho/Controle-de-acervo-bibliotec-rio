<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AcervoTech</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ============================
           RESET E BASE
           ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 0;
        }

        /* ============================
           TOPBAR
           ============================ */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-wrap: wrap;
            gap: 12px;
        }

        .topbar .logo {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar .logo i {
            color: #7c6dd6;
            font-size: 30px;
        }

        .topbar .logo span {
            color: #7c6dd6;
        }

        .topbar .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .topbar .user-area .user-name {
            font-weight: 400;
            font-size: 16px;
            color: #ddd;
        }

        .topbar .user-area .user-name i {
            margin-right: 8px;
            color: #7c6dd6;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: #e74c3c;
            border-color: #e74c3c;
            transform: scale(1.02);
        }

        /* ============================
           MENU DE NAVEGAÇÃO
           ============================ */
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu a {
            color: #ccc;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .menu a i {
            font-size: 16px;
        }

        .menu a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .menu a.ativo {
            background: rgba(124, 109, 214, 0.25);
            color: #fff;
            border-color: rgba(124, 109, 214, 0.4);
            box-shadow: 0 0 20px rgba(124, 109, 214, 0.15);
        }

        /* ============================
           CONTEÚDO PRINCIPAL
           ============================ */
        .main-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 30px 40px;
        }

        .main-content h2 {
            font-weight: 300;
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
        }

        .main-content .subtitle {
            color: #aaa;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* ============================
           CARDS DE ESTATÍSTICAS
           ============================ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 28px 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 24px 24px 0 0;
        }

        /* Cores diferentes para cada card */
        .card:nth-child(1)::before { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .card:nth-child(2)::before { background: linear-gradient(90deg, #43e97b, #38f9d7); }
        .card:nth-child(3)::before { background: linear-gradient(90deg, #fa709a, #fee140); }
        .card:nth-child(4)::before { background: linear-gradient(90deg, #f093fb, #f5576c); }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card .icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: inline-block;
            opacity: 0.8;
        }

        .card:nth-child(1) .icon { color: #4facfe; }
        .card:nth-child(2) .icon { color: #43e97b; }
        .card:nth-child(3) .icon { color: #f9d423; }
        .card:nth-child(4) .icon { color: #f5576c; }

        .card .numero {
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
            margin: 4px 0 6px;
        }

        .card .label {
            font-size: 15px;
            font-weight: 300;
            color: #ccc;
            letter-spacing: 0.3px;
        }

        /* ============================
           RESPONSIVO
           ============================ */
        @media (max-width: 768px) {
            .topbar {
                padding: 15px 20px;
            }
            .topbar .logo {
                font-size: 22px;
            }
            .menu {
                padding: 12px 20px;
                gap: 4px;
            }
            .menu a {
                padding: 8px 16px;
                font-size: 13px;
            }
            .main-content {
                padding: 0 20px 30px;
            }
            .cards-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .topbar .user-area .user-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================= -->
    <!-- VERIFICAÇÃO DE LOGIN                          -->
    <!-- ============================================= -->
    <script>
        const usuario = localStorage.getItem('usuario');
        if (!usuario) {
            window.location.href = '/';
        }
        const dadosUsuario = JSON.parse(usuario);
    </script>

    <!-- ============================================= -->
    <!-- TOPBAR                                        -->
    <!-- ============================================= -->
    <header class="topbar">
        <div class="logo">
            <i class="fas fa-book-open"></i>
            Acervo<span>Tech</span>
        </div>
        <div class="user-area">
            <span class="user-name"><i class="fas fa-user-circle"></i> <span id="nome-usuario"></span></span>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </header>

    <!-- ============================================= -->
    <!-- MENU DE NAVEGAÇÃO                            -->
    <!-- ============================================= -->
    <nav class="menu">
        <a href="/pages/dashboard.html" class="ativo"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="/pages/livros.html"><i class="fas fa-book"></i> Livros</a>
        <a href="/pages/usuarios.html"><i class="fas fa-users"></i> Usuários</a>
        <a href="/pages/emprestimos.html"><i class="fas fa-hand-holding"></i> Empréstimos</a>
        <a href="/pages/devolucoes.html"><i class="fas fa-undo-alt"></i> Devoluções</a>
    </nav>

    <!-- ============================================= -->
    <!-- CONTEÚDO PRINCIPAL                           -->
    <!-- ============================================= -->
    <div class="main-content">
        <h2>📊 Resumo da Biblioteca</h2>
        <p class="subtitle">Acompanhe os principais indicadores do seu acervo.</p>

        <div class="cards-grid" id="cards-estatisticas">
            <div class="card">
                <div class="icon"><i class="fas fa-book"></i></div>
                <div class="numero" id="total-livros">0</div>
                <div class="label">Total de Livros</div>
            </div>
            <div class="card">
                <div class="icon"><i class="fas fa-user-graduate"></i></div>
                <div class="numero" id="total-usuarios">0</div>
                <div class="label">Usuários Ativos</div>
            </div>
            <div class="card">
                <div class="icon"><i class="fas fa-exchange-alt"></i></div>
                <div class="numero" id="total-emprestimos">0</div>
                <div class="label">Empréstimos Ativos</div>
            </div>
            <div class="card">
                <div class="icon"><i class="fas fa-ban"></i></div>
                <div class="numero" id="total-indisponiveis">0</div>
                <div class="label">Livros Indisponíveis</div>
            </div>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- SCRIPTS                                       -->
    <!-- ============================================= -->
    <script>
        // Exibe o nome do usuário
        document.getElementById('nome-usuario').textContent = dadosUsuario.nome;

        // Função de logout
        function logout() {
            localStorage.removeItem('usuario');
            window.location.href = '/';
        }

        // =====================================================
        // CARREGAR ESTATÍSTICAS DO DASHBOARD
        // =====================================================
        async function carregarEstatisticas() {
            try {
                const resposta = await fetch('/api/dashboard');
                if (!resposta.ok) throw new Error('Erro ao buscar estatísticas');
                const dados = await resposta.json();

                document.getElementById('total-livros').textContent = dados.total_livros || 0;
                document.getElementById('total-usuarios').textContent = dados.total_usuarios || 0;
                document.getElementById('total-emprestimos').textContent = dados.total_emprestimos || 0;
                document.getElementById('total-indisponiveis').textContent = dados.total_indisponiveis || 0;

            } catch (erro) {
                console.error('Erro ao carregar estatísticas:', erro);
                // Opcional: exibir mensagem de erro amigável
            }
        }

        // Carrega as estatísticas quando a página carregar
        carregarEstatisticas();
    </script>

</body>
</html>
