<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcervoTech - Login</title>

    <!-- Google Fonts (Roboto e Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ============================
           RESET E BASE
           ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de partículas sutis (opcional) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><circle cx="10" cy="10" r="2" fill="white"/><circle cx="90" cy="20" r="1.5" fill="white"/><circle cx="30" cy="70" r="2" fill="white"/><circle cx="80" cy="80" r="1.8" fill="white"/><circle cx="50" cy="40" r="2.2" fill="white"/></svg>');
            background-size: 200px 200px;
            z-index: 0;
        }

        /* ============================
           CARD DE LOGIN
           ============================ */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 6px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .login-card {
            background: #ffffff;
            border-radius: 35px;
            padding: 40px 35px 35px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6);
        }

        /* Logo / Título */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .icon {
            font-size: 50px;
            color: #4a3f8a;
            background: linear-gradient(135deg, #4a3f8a, #7c6dd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-bottom: 6px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .login-header h1 span {
            color: #4a3f8a;
        }

        .login-header p {
            font-size: 14px;
            color: #777;
            font-weight: 300;
            margin-top: 4px;
        }

        /* ============================
           FORMULÁRIO
           ============================ */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #eee;
            border-radius: 30px;
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fc;
        }

        .form-group input:focus {
            border-color: #4a3f8a;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 63, 138, 0.15);
        }

        .form-group input:focus + i,
        .form-group input:focus ~ i {
            color: #4a3f8a;
        }

        /* Botão */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4a3f8a, #7c6dd6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(74, 63, 138, 0.3);
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(74, 63, 138, 0.4);
            background: linear-gradient(135deg, #3b3270, #6b5cbf);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Links */
        .login-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .login-footer a {
            color: #4a3f8a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }

        .login-footer a:hover {
            color: #2d2660;
            text-decoration: underline;
        }

        .login-footer .divider {
            color: #ccc;
            font-weight: 300;
        }

        /* Mensagem de erro */
        .mensagem-erro {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            min-height: 24px;
            font-weight: 500;
        }

        /* ============================
           RESPONSIVO
           ============================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px 25px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .login-footer {
                flex-direction: column;
                align-items: center;
            }
            .login-footer .divider {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Cabeçalho -->
            <div class="login-header">
                <div class="icon"><i class="fas fa-book-open"></i></div>
                <h1>Acervo<span>Tech</span></h1>
                <p>Bem-vindo de volta! Faça login para continuar.</p>
            </div>

            <!-- Formulário -->
            <form id="formLogin">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Seu e-mail" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" style="margin-right: 10px;"></i> Entrar
                </button>

                <div id="mensagem" class="mensagem-erro"></div>
            </form>

            <!-- Links -->
            <div class="login-footer">
                <a href="/pages/esqueci-senha.html"><i class="fas fa-key" style="margin-right: 6px;"></i>Esqueci minha senha</a>
                <span class="divider">|</span>
                <a href="/pages/register.html"><i class="fas fa-user-plus" style="margin-right: 6px;"></i>Cadastrar</a>
            </div>

        </div>
    </div>

    <!-- ============================
    SCRIPT DE LOGIN
    ============================ -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formLogin');
            const mensagem = document.getElementById('mensagem');

            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                mensagem.innerText = '';

                const email = document.getElementById('email').value.trim();
                const senha = document.getElementById('senha').value.trim();

                if (!email || !senha) {
                    mensagem.innerText = 'Preencha todos os campos.';
                    return;
                }

                try {
                    const resposta = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, senha })
                    });

                    const dados = await resposta.json();

                    if (resposta.ok) {
                        localStorage.setItem('usuario', JSON.stringify(dados.usuario));
                        window.location.href = '/pages/dashboard.html';
                    } else {
                        mensagem.innerText = dados.detail || 'E-mail ou senha incorretos.';
                    }
                } catch (erro) {
                    console.error(erro);
                    mensagem.innerText = 'Erro ao conectar com o servidor.';
                }
            });
        });
    </script>

</body>
</html>
